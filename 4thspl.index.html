<!DOCTYPE html>
<html>
<head>
<title>Cricket Stats Pro</title>

<style>
body{
font-family:Arial, sans-serif;
margin:0;
padding:0;
min-height:100vh;
background:linear-gradient(45deg,#0f2027,#1e3c72);
color:white;
transition:background 2s ease-in-out;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
margin-bottom:10px;
}

.player-name{
text-align:center;
font-size:22px;
margin-bottom:20px;
color:#ffd700;
font-weight:bold;
}

.section{
background:rgba(255,255,255,0.1);
padding:20px;
margin:20px 0;
border-radius:15px;
backdrop-filter:blur(10px);
border:2px solid rgba(255,255,255,0.2);
}

input{
padding:10px;
margin:5px;
width:150px;
border-radius:8px;
border:none;
}

button{
padding:10px 20px;
margin-top:10px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.saveBtn{
background:linear-gradient(45deg,#00c6ff,#0072ff);
color:white;
}

.resetBtn{
background:linear-gradient(45deg,#ff416c,#ff4b2b);
color:white;
margin-left:10px;
}

.nameBtn{
background:linear-gradient(45deg,#f7971e,#ffd200);
color:black;
}

.stats-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-top:20px;
}

.stat-box{
padding:20px;
border-radius:15px;
font-size:18px;
text-align:center;
font-weight:bold;
}

.runsBox{background:linear-gradient(45deg,#ff512f,#dd2476);}
.wicketsBox{background:linear-gradient(45deg,#11998e,#38ef7d);}
.battingBox{background:linear-gradient(45deg,#f7971e,#ffd200);}
.bowlingBox{background:linear-gradient(45deg,#00c6ff,#0072ff);}
.matchesBox{background:linear-gradient(45deg,#8e2de2,#4a00e0);}
</style>
</head>

<body>

<div class="container">
<h1>🏏 Cricket Stats Dashboard</h1>

<div class="player-name" id="displayName"></div>

<div class="section">
<h2>Player Name</h2>
<input type="text" id="playerName" placeholder="Enter Player Name">
<button class="nameBtn" onclick="saveName()">Save Name</button>
</div>

<div class="section">
<h2>Add Match Performance</h2>

<h3>Batting</h3>
<input type="number" id="runs" placeholder="Runs">
<input type="number" id="balls" placeholder="Balls Played">

<h3>Bowling</h3>
<input type="number" id="runsGiven" placeholder="Runs Given">
<input type="number" id="overs" placeholder="Overs Bowled">
<input type="number" id="wickets" placeholder="Wickets">

<br><br>
<button class="saveBtn" onclick="saveStats()">SAVE STATS</button>
<button class="resetBtn" onclick="resetStats()">RESET</button>
</div>

<div class="section">
<h2>Career Statistics</h2>

<div class="stats-grid">
<div class="stat-box matchesBox" id="matchesBox"></div>
<div class="stat-box runsBox" id="runsBox"></div>
<div class="stat-box battingBox" id="battingBox"></div>
<div class="stat-box wicketsBox" id="wicketsBox"></div>
<div class="stat-box bowlingBox" id="bowlingBox"></div>
</div>

</div>
</div>

<script>

// Load saved name
let savedName = localStorage.getItem("playerName");
if(savedName){
document.getElementById("displayName").innerHTML = "👤 " + savedName;
}

function saveName(){
let name = document.getElementById("playerName").value.trim();
if(name !== ""){
localStorage.setItem("playerName", name);
document.getElementById("displayName").innerHTML = "👤 " + name;
document.getElementById("playerName").value="";
}
}


// Load saved data
let data = JSON.parse(localStorage.getItem("cricketStats")) || {
matches:0,
totalRuns:0,
totalBalls:0,
totalRunsGiven:0,
totalOvers:0,
totalWickets:0
};

function saveStats(){

let runs = Number(document.getElementById("runs").value) || 0;
let balls = Number(document.getElementById("balls").value) || 0;
let runsGiven = Number(document.getElementById("runsGiven").value) || 0;
let overs = Number(document.getElementById("overs").value) || 0;
let wickets = Number(document.getElementById("wickets").value) || 0;

data.matches += 1;
data.totalRuns += runs;
data.totalBalls += balls;
data.totalRunsGiven += runsGiven;
data.totalOvers += overs;
data.totalWickets += wickets;

localStorage.setItem("cricketStats", JSON.stringify(data));

displayStats();

document.querySelectorAll("input[type='number']").forEach(i=>i.value="");
}

function displayStats(){

let strikeRate = data.totalBalls>0 ? 
((data.totalRuns/data.totalBalls)*100).toFixed(2):0;

let battingAvg = data.matches>0 ? 
(data.totalRuns/data.matches).toFixed(2):0;

let economy = data.totalOvers>0 ? 
(data.totalRunsGiven/data.totalOvers).toFixed(2):0;

let bowlingAvg = data.totalWickets>0 ? 
(data.totalRunsGiven/data.totalWickets).toFixed(2):0;

document.getElementById("matchesBox").innerHTML =
"Matches<br>"+data.matches;

document.getElementById("runsBox").innerHTML =
"Total Runs<br>"+data.totalRuns;

document.getElementById("battingBox").innerHTML =
"Strike Rate: "+strikeRate+"<br>Bat Avg: "+battingAvg;

document.getElementById("wicketsBox").innerHTML =
"Wickets<br>"+data.totalWickets;

document.getElementById("bowlingBox").innerHTML =
"Economy: "+economy+"<br>Bowl Avg: "+bowlingAvg;
}

function resetStats(){
if(confirm("Reset all stats?")){
localStorage.removeItem("cricketStats");
localStorage.removeItem("playerName");
location.reload();
}
}

displayStats();


// Auto changing background
const gradients=[
"linear-gradient(45deg,#0f2027,#1e3c72,#2a5298)",
"linear-gradient(45deg,#ff512f,#dd2476,#ff6a00)",
"linear-gradient(45deg,#00c6ff,#0072ff,#00f2fe)",
"linear-gradient(45deg,#11998e,#38ef7d,#00b09b)"
];

let index=0;
setInterval(()=>{
document.body.style.background=gradients[index];
index=(index+1)%gradients.length;
},4000);

</script>

</body>
</html>
